[codelinks]

[needs]
id_required = false
id_regex = "^[A-Z][A-Z0-9_]{3,}"

[[needs.types]]
directive = "req"
title = "Requirement"
prefix = "REQ_"
color = "#C7F9CC"
style = "node"

[[needs.types]]
directive = "component"
title = "Software Component"
prefix = "SW_COMP_"
color = "#F8B4C0"
style = "node"

[[needs.types]]
directive = "spec"
title = "Specification"
prefix = "SPEC_"
color = "#FDEACC"
style = "node"

[[needs.types]]
directive = "need"
title = "Generic Need"
color = "#E2E8F0"
prefix = ""
style = "node"

[needs.links.uplink]
incoming = "downlinks"
outgoing = "uplinks"
style = "#FDBA74"
style_part = "solid,#FDBA74"

# -- Requirement fields (referenced by The Way schemas) --

[needs.fields.test_type]
description = "Test Type"
schema.type = "string"

[needs.fields.req_type]
description = "Requirement Type"
schema.type = "array"
schema.items.type = "string"

[needs.fields.risk_level]
description = "Risk Level"
schema.type = "string"

[needs.fields.test_level]
description = "Test Level"
schema.type = "string"

[needs.fields.verification_criteria]
description = "Verification Criteria"
schema.type = "string"

[needs.fields.risk_analysis]
description = "Risk Analysis"
schema.type = "string"

# -- Component fields (referenced by The Way schemas) --

[needs.fields.design_overview]
description = "Design Overview"
schema.type = "string"

[needs.fields.internal_dependencies]
description = "Internal Dependencies"
schema.type = "string"

[needs.fields.decomposition]
description = "Decomposition"
schema.type = "string"

[needs.fields.sequence]
description = "Sequence"
schema.type = "string"

[needs.fields.performance_impact]
description = "Performance Impact"
schema.type = "string"

[needs.fields.memory_impact]
description = "Memory Impact"
schema.type = "string"
