# Thin caller for the org-wide reusable Rust CI workflow. This file owns the
# triggers and repo-specific configuration; luminartech/rust_workflow owns the
# jobs (pre-commit, lint, build, no_std canary, unit/property/fuzz tests,
# miri, MSRV, semver, security audit, docs, publish dry run, the "CI OK"
# aggregate gate, and release-plz automation).
name: CI

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      enable-comprehensive-tests:
        description: 'Run comprehensive test suites (longer fuzz, miri)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

# Concurrency is caller-owned; the reusable workflow defines none of its own.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ci:
    uses: luminartech/rust_workflow/.github/workflows/rust-ci.yml@v1
    # Test jobs downscope themselves to contents: read; this grant is only
    # used by the release-plz jobs (release PR + tag/GitHub-release publish).
    permissions:
      contents: write
      pull-requests: write
    secrets:
      cargo-registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      release-plz-app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
      release-plz-app-private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      codecov-token: ${{ secrets.CODECOV_TOKEN }}
    with:
      # Restrict publishing to the canonical repo so forks never publish.
      publish-repository: luminartech/automotive_wire_codec
      # release-plz owns versioning, changelogs, tags, and publishing.
      use-release-plz: true
      # The crate is unconditionally no_std + no-alloc: there is no alloc
      # feature, so the alloc build/lint variants are skipped.
      alloc-feature: ''
      # Unit tests live in the lib; the property suites are integration tests.
      unit-test-filter: 'not kind(test)'
      property-test-filter: 'kind(test)'
      # Comprehensive runs (nightly, merge queue, main) fuzz for 10 minutes.
      fuzz-max-time-comprehensive: 600
      # Coverage + junit test results go to Codecov; the ci profile comes
      # from .config/nextest.toml.
      upload-codecov: true
      nextest-profile: ci
      # Wire the manual dispatch toggle through to the comprehensive path.
      comprehensive-tests: ${{ inputs.enable-comprehensive-tests || false }}
