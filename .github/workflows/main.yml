name: UDS Protocol CI
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      enable-comprehensive-tests:
        description: "Run comprehensive test suites (longer fuzz, miri, benchmarks)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # =================================================================================================
  # CI Orchestration
  # =================================================================================================
  options:
    name: Resolve CI Options
    runs-on: ubuntu-latest
    outputs:
      comprehensive: ${{ steps.resolve.outputs.comprehensive }}
    steps:
      - name: Resolve event policy
        id: resolve
        shell: bash
        run: |
          comprehensive="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            comprehensive="${{ inputs.enable-comprehensive-tests }}"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            comprehensive="true"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "main" ]]; then
            comprehensive="true"
          fi

          echo "comprehensive=$comprehensive" >> "$GITHUB_OUTPUT"

  # =================================================================================================
  # Pre-commit
  # =================================================================================================
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: pre-commit/action@v3.0.1
        # Skip uv-lock in CI: it resolves the private `the-way` dependency over
        # SSH (git+ssh://git@github.com/luminartech/the-way), which the runner has
        # no credentials for. To restore it, give CI read access to that repo (a
        # token + git insteadOf rewrite) and drop this SKIP.
        env:
          SKIP: uv-lock

  # =================================================================================================
  # PR Title Linting
  # =================================================================================================
  # Mergify squashes each PR into a single commit using the PR title as the commit
  # message, so the title - not the individual commits in the branch - is what
  # lands on main and feeds release-plz's changelog.
  pr-title-lint:
    name: PR Title Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            docs
            refactor
            revert
            style
            test
            chore
            ci
            build

  # =================================================================================================
  # Linting and Formatting
  # =================================================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::pedantic

  # =================================================================================================
  # Build
  # =================================================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --all-features

  # =================================================================================================
  # Bare-metal no_std Build
  # =================================================================================================
  # Compiles against a core-only sysroot for a real embedded target (Cortex-M0:
  # no std, no atomic CAS, 32-bit). This is the only job that actually proves the
  # crate's no_std/no-alloc promise: a host `--no-default-features` build still
  # links a std-capable sysroot, so it can't catch std/atomics/alloc leaking in
  # through a dependency. Cheap regression insurance for the crate's reason to exist.
  no-std:
    name: Build no_std (bare-metal)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi
      - uses: Swatinem/rust-cache@v2
      - name: Build no_std
        run: cargo build --no-default-features --target thumbv6m-none-eabi

  # =================================================================================================
  # Unit Tests
  # =================================================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: |
          cargo llvm-cov nextest --all-features --all-targets -E 'not kind(test)' --lcov --output-path lcov.info
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true

  # =================================================================================================
  # Property Tests
  # =================================================================================================
  property-tests:
    name: Property Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run property tests
        run: cargo nextest run --all-features -E 'kind(test)' --test-threads=4

  # =================================================================================================
  # Fuzz Tests
  # =================================================================================================
  fuzz-tests:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    needs: [options]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      # taiki-e/install-action has no cargo-fuzz manifest, but rust-fuzz publishes
      # prebuilt GitHub-release binaries, so fetch one via cargo-binstall instead of
      # compiling from source (falls back to a source build only if none match).
      - uses: taiki-e/install-action@cargo-binstall
      - name: Install cargo-fuzz
        run: cargo binstall cargo-fuzz --no-confirm --locked
      - name: Build fuzz targets
        run: cargo fuzz build
      - name: Run fuzz targets
        run: |
          MAX_TIME=${{ needs.options.outputs.comprehensive == 'true' && 60 || 6 }}
          cargo fuzz run decode_roundtrip -- -max_total_time=${MAX_TIME}
      - name: Upload fuzz artifacts on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          retention-days: 30

  # =================================================================================================
  # Miri Tests (Undefined Behaviour Detection)
  # =================================================================================================
  miri-tests:
    name: Miri Tests
    runs-on: ubuntu-latest
    needs: [options]
    if: needs.options.outputs.comprehensive == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri tests
        env:
          PROPTEST_DISABLE_FAILURE_PERSISTENCE: "1"
          MIRIFLAGS: "-Zmiri-env-forward=PROPTEST_DISABLE_FAILURE_PERSISTENCE"
        run: cargo +nightly miri test -p automotive-wire-codec

  # =================================================================================================
  # MSRV Check
  # =================================================================================================
  msrv:
    name: Check MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Build with MSRV
        run: cargo build --all-features

  # =================================================================================================
  # Semver Checks
  # =================================================================================================
  semver-checks:
    name: Semver Checks
    runs-on: ubuntu-latest
    # Run on PRs (catch breaks before merge) and on main (release gate)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    # TODO: remove once automotive-wire-codec 0.1.0 is published to crates.io.
    # cargo-semver-checks needs a published baseline to diff against; until the
    # first release exists it errors with "not found in registry", so keep it
    # advisory rather than blocking the initial release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: automotive-wire-codec

  # =================================================================================================
  # Security & Supply Chain
  # =================================================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v7
      - name: Run cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2

  # =================================================================================================
  # Documentation
  # =================================================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"
      # nextest doesn't run doctests (https://github.com/nextest-rs/nextest/issues/16),
      # so the crate-level doc examples are only exercised here.
      - name: Run doctests
        run: cargo test --doc --all-features

  # =================================================================================================
  # Release (release-plz)
  # =================================================================================================
  # Runs only after the full verification suite passes on a push to main.
  #   - release-pr: maintains a Release PR (version bump + CHANGELOG).
  #   - release:    on merge of that PR, publishes to crates.io and creates the
  #                 git tag + GitHub release for the newly-bumped version.
  # Both mint a short-lived installation token from the release-plz GitHub App
  # (RELEASE_PLZ_APP_ID + RELEASE_PLZ_APP_PRIVATE_KEY) so the Release PR triggers
  # CI and release tags trigger downstream workflows; CARGO_REGISTRY_TOKEN
  # authenticates the crates.io publish.
  release-plz-release:
    name: Release-plz Release
    runs-on: ubuntu-latest
    needs:
      [
        pre-commit,
        lint,
        build,
        no-std,
        unit-tests,
        property-tests,
        fuzz-tests,
        miri-tests,
        msrv,
        semver-checks,
        security,
        docs,
      ]
    if: github.repository == 'luminartech/automotive_wire_codec' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Generate a token from the release-plz GitHub App
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    needs:
      [
        pre-commit,
        lint,
        build,
        no-std,
        unit-tests,
        property-tests,
        fuzz-tests,
        miri-tests,
        msrv,
        semver-checks,
        security,
        docs,
      ]
    if: github.repository == 'luminartech/automotive_wire_codec' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    # Serialize Release PR updates; never cancel an in-flight release.
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate a token from the release-plz GitHub App
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
