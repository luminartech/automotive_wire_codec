name: UDS Protocol CI
on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]
  merge_group:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      enable-comprehensive-tests:
        description: "Run comprehensive test suites (longer fuzz, miri, benchmarks)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # =================================================================================================
  # CI Orchestration
  # =================================================================================================
  options:
    name: Resolve CI Options
    runs-on: ubuntu-latest
    # Label changes and PR title/description edits only matter to the PR lint jobs -
    # skip the rest of the suite so metadata-only changes don't re-run all of CI.
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled' && github.event.action != 'edited'
    outputs:
      comprehensive: ${{ steps.resolve.outputs.comprehensive }}
    steps:
      - name: Resolve event policy
        id: resolve
        shell: bash
        run: |
          comprehensive="false"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            comprehensive="${{ inputs.enable-comprehensive-tests }}"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            comprehensive="true"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" == "main" ]]; then
            comprehensive="true"
          elif [[ "${{ github.event_name }}" == "merge_group" ]]; then
            comprehensive="true"
          fi

          echo "comprehensive=$comprehensive" >> "$GITHUB_OUTPUT"

  # =================================================================================================
  # Pre-commit
  # =================================================================================================
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled' && github.event.action != 'edited'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: pre-commit/action@v3.0.1

  # =================================================================================================
  # PR Title & Description Linting
  # =================================================================================================
  # Squash-merge (see repo settings) uses the PR title as the commit message, so the
  # title - not the individual commits in the branch - is what lands on main and
  # feeds release-plz's changelog.
  pr-title-lint:
    name: PR Title Lint
    runs-on: ubuntu-latest
    # release-plz's own PRs (branch prefix "release-plz-") are machine-generated and
    # don't follow the human PR template - skip both lints for them.
    if: |
      github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-plz-') &&
      github.event.action != 'labeled' && github.event.action != 'unlabeled'
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # amannn/action-semantic-pull-request matches types case-sensitively, so both
          # the lowercase (conventional-commit-spec) and capitalized forms are listed.
          types: |
            feat
            Feat
            fix
            Fix
            perf
            Perf
            docs
            Docs
            refactor
            Refactor
            revert
            Revert
            style
            Style
            test
            Test
            chore
            Chore
            ci
            CI
            build
            Build

  # PULL_REQUEST_TEMPLATE.md's "## Issue URL" and "## Testing" sections are meant to
  # be filled in, not left as the template's placeholder comments.
  pr-description-lint:
    name: PR Description Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-plz-')
    permissions:
      pull-requests: read
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const body = (context.payload.pull_request.body || "")
              .replace(/<!--[\s\S]*?-->/g, "")
              .trim();

            function section(heading) {
              const re = new RegExp(`##\\s*${heading}\\s*\\n([\\s\\S]*?)(?=\\n##\\s|$)`, "i");
              const match = body.match(re);
              return match ? match[1].trim() : "";
            }

            // Empty, or still just the template's unfilled "Closes #<issue ID>" stub.
            function isUnfilled(text) {
              return !text || /^(closes|fixes|towards|resolves)?\s*#?<.*>\s*$/i.test(text);
            }

            const hasNoIssueLabel = context.payload.pull_request.labels
              .some((label) => label.name === "No Issue");

            const problems = [];
            if (!hasNoIssueLabel && isUnfilled(section("Issue URL"))) {
              problems.push(
                '"## Issue URL" is empty - link the issue this PR addresses, ' +
                'or apply the "No Issue" label if there truly isn\'t one.'
              );
            }
            if (isUnfilled(section("Testing"))) {
              problems.push('"## Testing" is empty - describe what you tested.');
            }

            if (problems.length > 0) {
              core.setFailed(problems.join("\n"));
            }

  # =================================================================================================
  # Linting and Formatting
  # =================================================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled' && github.event.action != 'edited'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::pedantic

  # =================================================================================================
  # Build
  # =================================================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled' && github.event.action != 'edited'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --all-features

  # =================================================================================================
  # Bare-metal no_std Build
  # =================================================================================================
  # Compiles against a core-only sysroot for a real embedded target (Cortex-M0:
  # no std, no atomic CAS, 32-bit). This is the only job that actually proves the
  # crate's no_std/no-alloc promise: a host `--no-default-features` build still
  # links a std-capable sysroot, so it can't catch std/atomics/alloc leaking in
  # through a dependency. Cheap regression insurance for the crate's reason to exist.
  no-std:
    name: Build no_std (bare-metal)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled' && github.event.action != 'edited'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi
      - uses: Swatinem/rust-cache@v2
      - name: Build no_std
        run: cargo build --no-default-features --target thumbv6m-none-eabi

  # =================================================================================================
  # Unit Tests
  # =================================================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled' && github.event.action != 'edited'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: |
          cargo llvm-cov nextest --profile ci --all-features --all-targets -E 'not kind(test)' --lcov --output-path lcov.info
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true
      - name: Upload test results to Codecov
        if: '!cancelled()'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          flags: unit-tests
          report_type: test_results
          fail_ci_if_error: true

  # =================================================================================================
  # Property Tests
  # =================================================================================================
  property-tests:
    name: Property Tests
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled' && github.event.action != 'edited'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run property tests
        run: cargo nextest run --profile ci --all-features -E 'kind(test)' --test-threads=4
      - name: Upload test results to Codecov
        if: '!cancelled()'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          flags: property-tests
          report_type: test_results
          fail_ci_if_error: true

  # =================================================================================================
  # Fuzz Tests
  # =================================================================================================
  fuzz-tests:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    needs: [options]
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled' && github.event.action != 'edited'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      # rust-fuzz only publishes a musl-linked binary for Linux, and cargo-fuzz infers
      # its *own* build target from how it was compiled - so a binstall'd cargo-fuzz
      # tries to build fuzz targets against x86_64-unknown-linux-musl, which isn't
      # installed via rustup and conflicts with ASan's static-libc requirement anyway.
      # (This passed before only because some runners happened to already have a
      # working cargo-fuzz binary present, short-circuiting the binstall fetch.)
      # No safe prebuilt path here, so build from source.
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz targets
        run: cargo fuzz build
      - name: Run fuzz targets
        run: |
          MAX_TIME=${{ needs.options.outputs.comprehensive == 'true' && 60 || 6 }}
          cargo fuzz run decode_roundtrip -- -max_total_time=${MAX_TIME}
      - name: Upload fuzz artifacts on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          retention-days: 30

  # =================================================================================================
  # Miri Tests (Undefined Behaviour Detection)
  # =================================================================================================
  miri-tests:
    name: Miri Tests
    runs-on: ubuntu-latest
    needs: [options]
    if: needs.options.outputs.comprehensive == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri tests
        env:
          PROPTEST_DISABLE_FAILURE_PERSISTENCE: "1"
          MIRIFLAGS: "-Zmiri-env-forward=PROPTEST_DISABLE_FAILURE_PERSISTENCE"
        run: cargo +nightly miri test -p automotive-wire-codec

  # =================================================================================================
  # MSRV Check
  # =================================================================================================
  msrv:
    name: Check MSRV
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled' && github.event.action != 'edited'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Build with MSRV
        run: cargo build --all-features

  # =================================================================================================
  # Semver Checks
  # =================================================================================================
  semver-checks:
    name: Semver Checks
    runs-on: ubuntu-latest
    # Run on PRs (catch breaks before merge) and on main (release gate)
    if: |
      (github.event_name == 'pull_request' && github.event.action != 'labeled' && github.event.action != 'unlabeled' && github.event.action != 'edited') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    # TODO: remove once automotive-wire-codec 0.1.0 is published to crates.io.
    # cargo-semver-checks needs a published baseline to diff against; until the
    # first release exists it errors with "not found in registry", so keep it
    # advisory rather than blocking the initial release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: automotive-wire-codec

  # =================================================================================================
  # Security & Supply Chain
  # =================================================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled' && github.event.action != 'edited'
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v7
      - name: Run cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2

  # =================================================================================================
  # Documentation
  # =================================================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.event.action != 'labeled' && github.event.action != 'unlabeled' && github.event.action != 'edited'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"
      # nextest doesn't run doctests (https://github.com/nextest-rs/nextest/issues/16),
      # so the crate-level doc examples are only exercised here.
      - name: Run doctests
        run: cargo test --doc --all-features

  # =================================================================================================
  # Release (release-plz)
  # =================================================================================================
  # Runs only after the full verification suite passes on a push to main.
  #   - release-pr: maintains a Release PR (version bump + CHANGELOG).
  #   - release:    on merge of that PR, publishes to crates.io and creates the
  #                 git tag + GitHub release for the newly-bumped version.
  # Both mint a short-lived installation token from the release-plz GitHub App
  # (RELEASE_PLZ_APP_ID + RELEASE_PLZ_APP_PRIVATE_KEY) so the Release PR triggers
  # CI and release tags trigger downstream workflows; CARGO_REGISTRY_TOKEN
  # authenticates the crates.io publish.
  release-plz-release:
    name: Release-plz Release
    runs-on: ubuntu-latest
    needs:
      [
        pre-commit,
        lint,
        build,
        no-std,
        unit-tests,
        property-tests,
        fuzz-tests,
        miri-tests,
        msrv,
        semver-checks,
        security,
        docs,
      ]
    if: github.repository == 'luminartech/automotive_wire_codec' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Generate a token from the release-plz GitHub App
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    needs:
      [
        pre-commit,
        lint,
        build,
        no-std,
        unit-tests,
        property-tests,
        fuzz-tests,
        miri-tests,
        msrv,
        semver-checks,
        security,
        docs,
      ]
    if: github.repository == 'luminartech/automotive_wire_codec' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    # Serialize Release PR updates; never cancel an in-flight release.
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate a token from the release-plz GitHub App
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
