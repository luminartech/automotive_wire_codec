name: CI
on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      enable-comprehensive-tests:
        description: "Run comprehensive test suites (longer fuzz, miri, benchmarks)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # =================================================================================================
  # CI Orchestration
  # =================================================================================================
  options:
    name: Resolve CI Options
    runs-on: ubuntu-latest
    outputs:
      comprehensive: ${{ steps.resolve.outputs.comprehensive }}
    steps:
      - name: Resolve event policy
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          COMPREHENSIVE_INPUT: ${{ inputs.enable-comprehensive-tests }}
        run: |
          comprehensive="false"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            comprehensive="$COMPREHENSIVE_INPUT"
          elif [[ "$EVENT_NAME" == "schedule" || "$EVENT_NAME" == "merge_group" ]]; then
            comprehensive="true"
          elif [[ "$EVENT_NAME" == "push" && "$REF_NAME" == "main" ]]; then
            comprehensive="true"
          fi

          echo "comprehensive=$comprehensive" >> "$GITHUB_OUTPUT"

  # =================================================================================================
  # Pre-commit
  # =================================================================================================
  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Cache pre-commit environments
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      # pre-commit/action is archived/unmaintained, so invoke pre-commit directly.
      - name: Install pre-commit
        run: pipx install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  # =================================================================================================
  # Linting and Formatting
  # =================================================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::pedantic

  # =================================================================================================
  # Build
  # =================================================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build release
        run: cargo build --release --all-features

  # =================================================================================================
  # Bare-metal no_std Build
  # =================================================================================================
  # Compiles against a core-only sysroot for a real embedded target (Cortex-M0:
  # no std, no atomic CAS, 32-bit). This is the only job that actually proves the
  # crate's no_std/no-alloc promise: a host `--no-default-features` build still
  # links a std-capable sysroot, so it can't catch std/atomics/alloc leaking in
  # through a dependency. Cheap regression insurance for the crate's reason to exist.
  no-std:
    name: Build no_std (bare-metal)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: thumbv6m-none-eabi
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build no_std
        run: cargo build --no-default-features --target thumbv6m-none-eabi

  # =================================================================================================
  # Unit Tests
  # =================================================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-nextest and cargo-llvm-cov
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-nextest,cargo-llvm-cov
      - name: Run tests with coverage
        run: |
          cargo llvm-cov nextest --profile ci --all-features --all-targets -E 'not kind(test)' --lcov --output-path lcov.info
      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: true
      - name: Upload test results to Codecov
        if: '!cancelled()'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          flags: unit-tests
          report_type: test_results
          fail_ci_if_error: true

  # =================================================================================================
  # Property Tests
  # =================================================================================================
  property-tests:
    name: Property Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-nextest
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-nextest
      - name: Run property tests
        run: cargo nextest run --profile ci --all-features -E 'kind(test)' --test-threads=4
      - name: Upload test results to Codecov
        if: '!cancelled()'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/nextest/ci/junit.xml
          flags: property-tests
          report_type: test_results
          fail_ci_if_error: true

  # =================================================================================================
  # Fuzz Tests
  # =================================================================================================
  fuzz-tests:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    needs: [options]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: fuzz
      # Restore the corpus grown by earlier runs so fuzzing accumulates coverage
      # across CI runs instead of restarting from the committed seed corpus. The
      # per-run key means each successful run saves its (possibly grown) corpus;
      # restore-keys picks up the most recent prior run's corpus.
      - name: Restore fuzz corpus
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-
      # rust-fuzz only publishes a musl-linked binary for Linux, and cargo-fuzz infers
      # its *own* build target from how it was compiled - so a binstall'd cargo-fuzz
      # tries to build fuzz targets against x86_64-unknown-linux-musl, which isn't
      # installed via rustup and conflicts with ASan's static-libc requirement anyway.
      # (This passed before only because some runners happened to already have a
      # working cargo-fuzz binary present, short-circuiting the binstall fetch.)
      # No safe prebuilt path here, so build from source.
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz targets
        run: cargo fuzz build
      - name: Run fuzz targets
        env:
          MAX_TIME: ${{ needs.options.outputs.comprehensive == 'true' && 600 || 6 }}
        run: cargo fuzz run decode_roundtrip -- -max_total_time="${MAX_TIME}"
      - name: Upload fuzz artifacts on failure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          retention-days: 30

  # =================================================================================================
  # Miri Tests (Undefined Behaviour Detection)
  # =================================================================================================
  miri-tests:
    name: Miri Tests
    runs-on: ubuntu-latest
    needs: [options]
    if: needs.options.outputs.comprehensive == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly
          components: miri
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run Miri tests
        env:
          PROPTEST_DISABLE_FAILURE_PERSISTENCE: "1"
          MIRIFLAGS: "-Zmiri-env-forward=PROPTEST_DISABLE_FAILURE_PERSISTENCE"
        run: cargo +nightly miri test -p automotive-wire-codec

  # =================================================================================================
  # MSRV Check
  # =================================================================================================
  msrv:
    name: Check MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Single-source the MSRV from Cargo.toml's rust-version so the workflow
      # can't drift from what the manifest promises.
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          msrv=$(sed -n 's/^rust-version = "\(.*\)"$/\1/p' Cargo.toml)
          if [[ -z "$msrv" ]]; then
            echo "rust-version not found in Cargo.toml" >&2
            exit 1
          fi
          echo "msrv=$msrv" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build with MSRV
        run: cargo build --all-features

  # =================================================================================================
  # Semver Checks
  # =================================================================================================
  semver-checks:
    name: Semver Checks
    runs-on: ubuntu-latest
    # Run on PRs (catch breaks before merge) and on main (release gate)
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2.9
        with:
          package: automotive-wire-codec

  # =================================================================================================
  # Security & Supply Chain
  # =================================================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run cargo audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run cargo deny
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1

  # =================================================================================================
  # Documentation
  # =================================================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"
      # nextest doesn't run doctests (https://github.com/nextest-rs/nextest/issues/16),
      # so the crate-level doc examples are only exercised here.
      - name: Run doctests
        run: cargo test --doc --all-features

  # =================================================================================================
  # Aggregate Gate
  # =================================================================================================
  # Single context for branch protection: the ruleset requires "CI OK" instead of
  # enumerating every job, so job renames can't silently drop protection. Skipped
  # jobs are fine (miri is comprehensive-only, semver doesn't run in the merge
  # queue); failures and cancellations are not.
  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    if: always()
    needs:
      [
        pre-commit,
        lint,
        build,
        no-std,
        unit-tests,
        property-tests,
        fuzz-tests,
        miri-tests,
        msrv,
        semver-checks,
        security,
        docs,
      ]
    steps:
      - name: Verify no job failed
        env:
          RESULTS: ${{ toJSON(needs.*.result) }}
        run: |
          echo "$RESULTS"
          if grep -qE 'failure|cancelled' <<<"$RESULTS"; then
            exit 1
          fi

  # =================================================================================================
  # Release (release-plz)
  # =================================================================================================
  # Runs only after the full verification suite passes on a push to main.
  #   - release-pr: maintains a Release PR (version bump + CHANGELOG).
  #   - release:    on merge of that PR, publishes to crates.io and creates the
  #                 git tag + GitHub release for the newly-bumped version.
  # Both mint a short-lived installation token from the release-plz GitHub App
  # (RELEASE_PLZ_APP_ID + RELEASE_PLZ_APP_PRIVATE_KEY) so the Release PR triggers
  # CI and release tags trigger downstream workflows; CARGO_REGISTRY_TOKEN
  # authenticates the crates.io publish.
  release-plz-release:
    name: Release-plz Release
    runs-on: ubuntu-latest
    needs: [ci-ok]
    if: github.repository == 'luminartech/automotive_wire_codec' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Generate a token from the release-plz GitHub App
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
          permission-contents: write
      # release-plz pushes the release tag with the checked-out credentials, so
      # this checkout intentionally persists the app token.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # zizmor: ignore[artipacked] v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - name: Run release-plz release
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    needs: [ci-ok]
    if: github.repository == 'luminartech/automotive_wire_codec' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
    # Serialize Release PR updates; never cancel an in-flight release.
    concurrency:
      group: release-plz-pr-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate a token from the release-plz GitHub App
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      # release-plz pushes the release-pr branch with the checked-out
      # credentials, so this checkout intentionally persists the app token.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # zizmor: ignore[artipacked] v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - name: Run release-plz release-pr
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
